services:
  postgres:
    image: postgres:17
    container_name: greenlight-postgres
    environment:
      POSTGRES_USER: databaseUser
      POSTGRES_PASSWORD: databasePassword
      POSTGRES_DB: greenlight
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U databaseUser -d greenlight"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: greenlight-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@greenlight.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  pgadmin-data:
